version: 2

updates:
  # Root / shared packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      turbo:
        patterns: ['turbo']
      typescript:
        patterns: ['typescript', 'prettier']
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'

  # NestJS API
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      typeorm:
        patterns:
          - 'typeorm'
          - '@nestjs/typeorm'
          - 'pg'
      passport:
        patterns:
          - 'passport'
          - 'passport-*'
          - '@types/passport*'
      class-validator:
        patterns:
          - 'class-validator'
          - 'class-transformer'
      testing:
        patterns:
          - 'jest'
          - 'ts-jest'
          - '@types/jest'
          - '@types/mocha'
          - 'supertest'
          - '@types/supertest'
          - 'better-sqlite3'
          - '@nestjs/testing'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@typescript-eslint/*'
      typescript:
        patterns:
          - 'typescript'
          - 'prettier'
          - '@types/node'
          - '@types/express'
          - '@types/bcryptjs'
          - 'reflect-metadata'
          - 'rxjs'
    labels:
      - dependencies
      - api
    commit-message:
      prefix: 'chore(deps/api)'

  # Next.js Web
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - 'eslint-config-next'
      radix:
        patterns:
          - '@radix-ui/*'
      tanstack:
        patterns:
          - '@tanstack/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - 'tailwindcss-animate'
          - 'tailwind-merge'
          - 'autoprefixer'
          - 'postcss'
      forms:
        patterns:
          - 'react-hook-form'
          - '@hookform/*'
          - 'zod'
      ui-utils:
        patterns:
          - 'lucide-react'
          - 'class-variance-authority'
          - 'clsx'
          - 'next-themes'
          - 'sonner'
          - 'date-fns'
      axios:
        patterns:
          - 'axios'
          - 'js-cookie'
          - '@types/js-cookie'
      typescript:
        patterns:
          - 'typescript'
          - '@types/node'
    labels:
      - dependencies
      - web
    commit-message:
      prefix: 'chore(deps/web)'

  # Docker base images
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: 'chore(docker/api)'

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: 'chore(docker/web)'

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(ci)'
